<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galletix POS - Panel de Administración</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Galletix POS · Admin</h1>
        <div style="display:flex; align-items:center; gap:15px;">
            <span id="nombre-admin"></span>
            <button id="btn-salir" class="btn-secundario">Cerrar sesión</button>
        </div>
    </header>

    <main class="contenedor-admin">

        <section class="panel-admin">
            <h2>Reporte de Ventas</h2>

            <form id="form-filtro" class="filtro-fechas">
                <div>
                    <label for="fecha-inicio">Desde:</label>
                    <input type="date" id="fecha-inicio">
                </div>
                <div>
                    <label for="fecha-fin">Hasta:</label>
                    <input type="date" id="fecha-fin">
                </div>
                <button type="submit" class="btn-pagar">Filtrar</button>
            </form>

            <div id="resumen-totales" class="resumen-totales"></div>

            <div class="tabla-scroll">
                <table id="tabla-ventas">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Empleado</th>
                            <th>Método</th>
                            <th>Total</th>
                            <th>Comprobante</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-ventas">
                        <tr><td colspan="5">Cargando ventas...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="panel-admin">
            <h2>Usuarios del Sistema</h2>

            <ul id="lista-usuarios" class="lista-usuarios">
                <li>Cargando usuarios...</li>
            </ul>

            <h3>Agregar nuevo usuario</h3>
            <form id="form-usuario" class="form-usuario">
                <input type="text" id="nuevo-nombre" placeholder="Nombre completo" required>
                <input type="email" id="nuevo-email" placeholder="Correo electrónico" required>
                <input type="password" id="nuevo-password" placeholder="Contraseña (mínimo 6 caracteres)" required minlength="6">
                <select id="nuevo-rol" required>
                    <option value="EMPLEADO">Empleado</option>
                    <option value="ADMIN">Administrador</option>
                </select>
                <button type="submit" class="btn-pagar">Crear Usuario</button>
            </form>
            <p id="mensaje-usuario" style="display:none; margin-top:10px;"></p>
        </section>

    </main>

    <script src="admin.js"></script>
</body>
</html>
