<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Galletix POS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header style="background-color: #2c3e50;"> <!-- Color diferente para distinguir del cajero -->
        <h1>Galletix SaaS - Panel de Administración</h1>
        <a href="index.html" style="color: white; text-decoration: none; border: 1px solid white; padding: 5px 10px; border-radius: 4px;">Ir al Cajero</a>
    </header>

    <main class="contenedor-principal" style="flex-direction: column; overflow-y: auto;">
        
        <!-- Sección para Agregar Productos -->
        <section class="seccion-productos" style="margin-bottom: 20px;">
            <h2>Agregar Nuevo Producto</h2>
            <form id="form-producto" style="display: flex; gap: 10px; align-items: flex-end;">
                <div>
                    <label>Nombre:</label><br>
                    <input type="text" id="prod-nombre" required>
                </div>
                <div>
                    <label>Descripción:</label><br>
                    <input type="text" id="prod-desc">
                </div>
                <div>
                    <label>Precio ($):</label><br>
                    <input type="number" id="prod-precio" step="0.01" required>
                </div>
                <div>
                    <label>Stock inicial:</label><br>
                    <input type="number" id="prod-stock" value="100" required>
                </div>
                <button type="submit" class="btn-pagar" style="margin: 0; padding: 10px;">Guardar Producto</button>
            </form>
        </section>

        <!-- Sección de Auditoría de Ventas -->
        <section class="seccion-orden">
            <h2>Auditoría de Ventas</h2>
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr style="background-color: #eee;">
                        <th style="padding: 10px; border-bottom: 2px solid #ccc;">ID Venta</th>
                        <th style="padding: 10px; border-bottom: 2px solid #ccc;">Fecha</th>
                        <th style="padding: 10px; border-bottom: 2px solid #ccc;">Total</th>
                        <th style="padding: 10px; border-bottom: 2px solid #ccc;">Método</th>
                        <th style="padding: 10px; border-bottom: 2px solid #ccc;">Comprobante</th>
                    </tr>
                </thead>
                <tbody id="tabla-ventas">
                    <!-- Las ventas se cargarán aquí -->
                </tbody>
            </table>
        </section>

    </main>

    <script src="admin.js"></script>
</body>
</html>
