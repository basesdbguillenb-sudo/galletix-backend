<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Galletix POS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #2c3e50; padding: 20px; margin: 0;">    
    <div style="background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center;">
        <h1 style="color: #ff9800; margin-top: 0;">Galletix POS</h1>
        <p>Ingresa tus credenciales para continuar</p>

        <form id="form-login" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            <div style="text-align: left;">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" required style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            
            <div style="text-align: left;">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" required style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <button type="submit" class="btn-pagar" style="margin-top: 10px;">Iniciar Sesión</button>
        </form>
        <p id="mensaje-error" style="color: red; display: none; margin-top: 15px;"></p>
    </div>

    <script src="login.js"></script>
</body>
</html>
